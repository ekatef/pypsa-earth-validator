name: Test workflows short

on:
  push:
    branches:
    # - main
    - add_objective_comparison
  pull_request:
    branches:
    - main
  workflow_dispatch:

# # Cancel any in-progress runs when a new run is triggered
# concurrency:
#   group: ${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true

env:
  BASE_ENV: envs/environment.yaml

jobs:
  run-tests:
    if: ${{ github.ref == 'refs/heads/add_objective_comparison' || github.event_name == 'workflow_dispatch' }}
    # if: ${{ github.event_name == 'workflow_dispatch' }}
    name: OS
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        # os: [ubuntu, macos, windows]
        os: [ubuntu]
        include:
        - os: ubuntu
          env_file: envs/linux-64.lock.yaml
        - os: macos
          env_file: envs/osx-arm64.lock.yaml
        # - os: windows
        #   env_file: envs/win-64.lock.yaml

    defaults:
      run:
        shell: bash -l {0}

    steps:
    - uses: actions/checkout@v4

    - name: Use base env file if it was changed
      run: |
        git fetch origin main
        if git diff --name-only origin/main | grep -E '(${{env.BASE_ENV }}|.*lock.yaml)$'; then
          if git diff --name-only origin/main | grep -E '.*lock.yaml'; then
            echo "Lock files changed. Using lock files."
            echo "env_file=${{ matrix.env_file }}" >> $GITHUB_ENV
          else
            echo "Only base env ${{ env.BASE_ENV }} changed. Using it instead of locked envs."
            echo "env_file=${{ env.BASE_ENV }}" >> $GITHUB_ENV
          fi
        else
          echo "Neither base env nor lock files changed. Using lock files."
          echo "env_file=${{ matrix.env_file }}" >> $GITHUB_ENV
        fi

    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        activate-environment: pypsa-earth
        channel-priority: strict
        conda-remove-defaults: true

    - name: Cache Conda env
      uses: actions/cache@v4
      with:
        path: ${{ env.CONDA }}/envs
        key: conda-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles(format('{0}', env.env_file)) }}
      id: cache-env

    - name: Update environment
      if: steps.cache-env.outputs.cache-hit != 'true'
      run: conda env update -n pypsa-earth -f ${{ matrix.env_file }}

    - name: Conda list
      run: conda list

    - name: Run Test
      run: make test

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci_outputs-${{ matrix.os }}
        # name: results-${{ matrix.os }}
        path: |
          logs
          .snakemake/log
          results 
      # with:
      #   name: model-results
      #   path: test_output/
      # retention-days: 3

    # Download artifacts
    - name: Download feature logs
      uses: actions/download-artifact@v4
      with:
        name: ci_outputs-${{ matrix.os }}
        # path: ./artifacts  # All artifacts go here, each in their own subfolder

    - name: Show downloaded structure
      run: |
        echo "Current working directory: $(pwd)"
        echo "All files and folders after artifact download:"
        find . -type f -o -type d | sort
  
    # - name: Cat all files
    #   run: |
    #     # find . -type f -path "*/logs/*" | while read file; do
    #     #   echo "===== $file ====="
    #     #   cat "$file"
    #     #   echo
    #     # done

    - name: Extract objective
      id: extract_obj
      run: |


        shopt -s nullglob

        OBJ_STRING="(?<=INFO:__main__:Objective function: ).*"
        LOG_FILES=(./logs/solve_network/*_python.log ./logs/*/solve_network/*_python.log)
        echo "Extracting the objective values from the logs"
        OBJ_FOUND=$(
          awk '/INFO:__main__:Objective function: /{
                 sub(/\r$/, "");
                 sub(/.*INFO:__main__:Objective function: /, "");
                 print FILENAME ":" $0
               }' "${LOG_FILES[@]}" || true
        )
        shopt -u nullglob

        # The objective can be also empty (in case some tests failed)
        if [ -z "$OBJ_FOUND" ]; then
          echo "Objective not found."
          exit 1
        else
          echo "Objective value found: $OBJ_FOUND"
          echo "Writing to GitHub output"
          #printf "%s\n" "obj_match=$OBJ_FOUND" >> "$GITHUB_OUTPUT"
          delim="OBJ_EOF_$(date +%s%N)"
          {
            echo "obj_match<<$delim"
            printf '%s\n' "$OBJ_FOUND"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"
        fi

        echo "The objective extracted successfully"

        # Add Python import
        extract_obj_for_path_py() {
          python - "$1" "$2" <<'PY'
        import sys
        from test.utils.extract_ref_objective import extract_obj_for_path
        dir, fl = sys.argv[1], sys.argv[2]
        print(extract_obj_for_path(dir, fl))
        PY
        }  

        # Create properly formatted outputs

        clean_csv_cell() { local s=${1//\"/\"\"}; printf '"%s"' "$s"; }  

        TABLE="| Folder | File | Current Objective | Reference Objective |"
        TABLE+="\n|:----|:-----|------------------:|--------------------:|"

        CSV_FILE="ref_objectives-${{ matrix.os }}.csv"

        CSV_CONTENT="folder,file,objective"

        while IFS= read -r line; do
          FILE=$(echo "$line" | cut -d: -f1)
          VALUE=$(echo "$line" | cut -d: -f2-)
          BASENAME=$(basename "$FILE")

          # An enclosing folder contains a name of the run
          FOLDER=$(echo "$FILE" | sed -E 's|.*/logs/([^/]+)/solve_network/.*|\1|')

          if [[ "$FILE" == ./logs/solve_network/* ]]; then
            FOLDER="default"
          fi

          OBJ_SCALE=1000000
          VALUE_SCALED=$(awk -v v="$VALUE" -v s="$OBJ_SCALE" 'BEGIN { if (s==0) { print "NaN"; exit 1 } printf "%.2f\n", v/s }')

          REF_VALUE=$(extract_obj_for_path_py "$FOLDER" "$BASENAME")

          TABLE+="\n| $FOLDER | $BASENAME | \`$VALUE_SCALED\` | \`$REF_VALUE\` |"

          CSV_CONTENT+=$'\n'"$(clean_csv_cell $FOLDER),$(clean_csv_cell $BASENAME),$(clean_csv_cell $VALUE_SCALED)"

        done <<< "$OBJ_FOUND"
        
        echo -e "$TABLE"

        echo "The output table is formed"
        
        echo "### Values of Objective Function" >> "$GITHUB_STEP_SUMMARY"

        echo "GITHUB_STEP_SUMMARY successfully supplemented with a header"  

        printf "%b\n" "$TABLE" >> "$GITHUB_STEP_SUMMARY"

        printf "%b" "$CSV_CONTENT" > "$CSV_FILE"

    - name: Upload csv artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ref_objectives-${{ matrix.os }}
        path: ref_objectives-${{ matrix.os }}.csv          

    - name: Plot CI outputs
      id: plot_networks
      run: |
        # Needed to facilitate upload to the artifacts
        mkdir -p plot_outputs-${{ matrix.os }}

        RESULTS_DIR="."
        nc_files=$(find "$RESULTS_DIR" -type f -path "*/results/networks/*.nc" -o -path "*/results/*/networks/*.nc")
        
        if [ -z "$nc_files" ]; then
          echo "No .nc files found in any networks folder."
          exit 1
        fi

        # TODO Replace the fix with some run_id
        i=0
        while IFS= read -r nc_file; do
          echo "Processing file: $nc_file"
        
          folder=$(dirname "$nc_file")  # get the folder containing the .nc file
          runfolder=$(basename "$(dirname "$(dirname "$nc_file")")")

          filename=$(basename "$nc_file")

          subfolder="plot_outputs-${{ matrix.os }}/$runfolder"
          mkdir -p "$subfolder"
          output_path="${subfolder}/${filename}_${i}.png"

          i+=1
        
          python3 scripts/non_workflow/plot_network.py "$nc_file" "$output_path"
        
          echo "Plot saved to: $output_path"
        
        done <<< "$nc_files"

    - name: Upload plot artifacts
      uses: actions/upload-artifact@v4
      with:
        name: scenario-plots-${{ matrix.os }}
        path: plot_outputs-${{ matrix.os }}

    - name: Publish to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        personal_token: ${{ secrets.GH_PAGES_TOKEN }}
        publish_dir: ./plot_outputs-${{ matrix.os }}
        publish_branch: gh-pages
        force_orphan: true  # Optional: makes the gh-pages branch have no history

    - name: Add plots to summary
      run: |
        echo "### Network Plots" >> "$GITHUB_STEP_SUMMARY"
        for file in $(find ./plot_outputs-${{ matrix.os }} -type f -name "*.png"); do
          rel_path=${file#./plot_outputs-${{ matrix.os }}/}
          name=$(basename "$file" .nc)
          folder_name=$(basename "$(dirname "$file")")
            {
              echo "### $folder_name; $name"
              echo "![Plot](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/$rel_path)"
              echo ""  # blank line for spacing
            } >> "$GITHUB_STEP_SUMMARY"
        done
      shell: bash

    - name: Add plots to summary
      run: |
        echo "### Network plots" >> "$GITHUB_STEP_SUMMARY"
        echo "The generated plots are available for download from the [Artifacts tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"        
     
